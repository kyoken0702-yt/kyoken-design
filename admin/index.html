<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>京建供应链后台</title>
  <style>
    :root {
      --navy: #061a44;
      --blue: #12346b;
      --line: #d7deea;
      --paper: #f5f7fb;
      --red: #a32736;
      --gold: #d7a84b;
      --green: #047857;
      --text: #10213d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Microsoft YaHei", sans-serif;
      background: var(--paper);
      color: var(--text);
      font-size: 16px;
      line-height: 1.55;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px clamp(16px, 4vw, 40px);
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    h1, h2, h3, p { margin: 0; }
    h1 { color: var(--navy); font-size: clamp(22px, 3vw, 34px); font-weight: 950; }
    h2 { color: var(--navy); font-size: 22px; font-weight: 950; margin-bottom: 14px; }
    h3 { color: var(--navy); font-size: 18px; font-weight: 900; }
    main { width: min(1180px, 100%); margin: 0 auto; padding: 22px 16px 48px; }
    .grid { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(320px, .85fr); gap: 18px; align-items: start; }
    .panel {
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(6, 26, 68, .06);
      padding: clamp(16px, 2.5vw, 24px);
    }
    .stack { display: grid; gap: 14px; }
    label { display: grid; gap: 7px; font-weight: 900; color: var(--navy); }
    input, select, textarea {
      width: 100%;
      border: 1px solid #c7d1e2;
      background: #fff;
      color: var(--text);
      padding: 12px 13px;
      font: inherit;
      font-weight: 750;
      border-radius: 0;
    }
    input:focus, select:focus, textarea:focus { outline: 3px solid rgba(18, 52, 107, .14); border-color: var(--blue); }
    .hint { color: #52637b; font-size: 13px; font-weight: 750; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .file-picker {
      border: 1px dashed #9aa9bf;
      background: #f8fafc;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .file-input-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    button {
      border: 1px solid var(--navy);
      background: var(--navy);
      color: #fff;
      padding: 12px 16px;
      font: inherit;
      font-weight: 950;
      cursor: pointer;
      border-radius: 0;
    }
    button.secondary { background: #fff; color: var(--navy); }
    button.danger { background: #fff; color: var(--red); border-color: var(--red); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .status {
      border-left: 5px solid var(--blue);
      background: #eef4ff;
      color: var(--navy);
      padding: 12px 14px;
      font-weight: 900;
      white-space: pre-wrap;
    }
    .status.ok { border-color: var(--green); background: #ecfdf5; color: #065f46; }
    .status.warn { border-color: var(--red); background: #fff1f2; color: #9f1239; }
    .login-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid #ead49a;
      background: #fff8e6;
      padding: 12px;
      color: var(--navy);
      font-weight: 900;
    }
    .login-strip.ok {
      border-color: #a7f3d0;
      background: #ecfdf5;
      color: #065f46;
    }
    .preview-grid, .record-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .thumb {
      border: 1px solid var(--line);
      background: #f8fafc;
      padding: 8px;
      min-width: 0;
    }
    .thumb img, .thumb video {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #dde5f1;
    }
    .thumb span {
      display: block;
      margin-top: 6px;
      color: #42546f;
      font-size: 12px;
      font-weight: 800;
      word-break: break-all;
    }
    .record {
      border: 1px solid var(--line);
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 10px;
    }
    .record small { color: #52637b; font-weight: 800; }
    .record .media-count { color: var(--red); font-weight: 950; }
    .module-note {
      border: 1px solid var(--line);
      background: #f8fafc;
      padding: 10px 12px;
      color: var(--navy);
      font-weight: 900;
    }
    .top-note { color: #43536c; font-weight: 800; }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .actions button { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>京建供应链后台</h1>
      <p class="top-note">只做三件事：写大标题、选模块、上传现场照片/小视频。</p>
    </div>
    <div class="actions">
      <button id="loginBtn" type="button">登录 GitHub</button>
      <button id="reloadBtn" class="secondary" type="button">刷新记录</button>
    </div>
  </header>

  <main class="grid">
    <section class="panel stack">
      <h2>新增 / 更新前台记录</h2>
      <div id="status" class="status">请先登录。登录后可以一次上传多张图片。</div>
      <div id="loginStrip" class="login-strip">
        <span id="loginText">未登录。点击“上传并发布”会先打开 GitHub 登录。</span>
        <button id="inlineLoginBtn" type="button">先登录</button>
      </div>

      <label>
        前台模块
        <select id="category">
          <option value="factory">中国工厂・供应链实景（前台首页 #factory）</option>
          <option value="site">日本现场记录（前台首页 #site）</option>
        </select>
      </label>
      <label id="channelField">
        材料上传通道
        <select id="channel">
          <option value="advertising">广告材料制作工厂</option>
          <option value="curtain">窗帘加工制作工厂</option>
          <option value="wpc">塑木板材料工厂</option>
        </select>
        <span class="hint">选择后会自动填写三语大标题；前台会归到同一个材料通道。</span>
      </label>
      <div id="moduleNote" class="module-note">将显示在前台：首页 → 中国工厂・供应链实景</div>

      <label>
        中文大标题
        <input id="titleZh" type="text" placeholder="例如：广告材料制作工厂">
        <span class="hint">这是中文前台显示的大标题。</span>
      </label>

      <label>
        日本語タイトル
        <input id="titleJa" type="text" placeholder="例：広告材料制作工場">
      </label>

      <label>
        English Title
        <input id="titleEn" type="text" placeholder="Example: Advertising Material Production Factory">
      </label>

      <div class="file-picker">
        <strong>选择图片 / 小视频</strong>
        <button id="selectFilesBtn" class="secondary" type="button">选择图片 / 视频（可多选）</button>
        <input id="files" class="file-input-hidden" type="file" multiple accept="image/jpeg,image/png,image/webp,video/mp4,video/webm">
        <span id="fileSummary" class="hint">未选择文件。</span>
        <span class="hint">图片建议 JPG / PNG / WebP。视频建议 MP4 / WebM 且小于 25MB。手机 MOV 请先转 MP4。</span>
      </div>

      <div class="preview-grid" id="previewGrid"></div>

      <div class="actions">
        <button id="publishBtn" type="button">上传并发布</button>
        <button id="clearBtn" class="secondary" type="button">清空表单</button>
      </div>
    </section>

    <aside class="panel stack">
      <h2>当前记录</h2>
      <p class="hint">删除会提交到 GitHub。前台按记录文件名日期倒序显示。</p>
      <div id="recordList" class="stack"></div>
    </aside>
  </main>

  <script>
    (function () {
      var owner = "kyoken0702-yt";
      var repo = "kyoken-design";
      var branch = "master";
      var tokenKey = "kyoken_custom_admin_github_token";
      var token = sessionStorage.getItem(tokenKey) || "";
      var popup = null;
      var pendingPublish = false;

      var $ = function (id) { return document.getElementById(id); };
      var status = $("status");
      var loginBtn = $("loginBtn");
      var inlineLoginBtn = $("inlineLoginBtn");
      var loginStrip = $("loginStrip");
      var loginText = $("loginText");
      var reloadBtn = $("reloadBtn");
      var publishBtn = $("publishBtn");
      var clearBtn = $("clearBtn");
      var selectFilesBtn = $("selectFilesBtn");
      var filesInput = $("files");
      var fileSummary = $("fileSummary");
      var previewGrid = $("previewGrid");
      var recordList = $("recordList");
      var categoryInput = $("category");
      var channelInput = $("channel");
      var channelField = $("channelField");
      var moduleNote = $("moduleNote");

      var moduleLabels = {
        factory: {
          zh: "中国工厂・供应链实景",
          ja: "中国工場・供給実景",
          en: "China Factory & Supply Records",
          anchor: "首页 #factory"
        },
        site: {
          zh: "日本现场记录",
          ja: "日本現場記録",
          en: "Japan Site Records",
          anchor: "首页 #site"
        }
      };

      var channelLabels = {
        advertising: {
          zh: "广告材料制作工厂",
          ja: "広告材料制作工場",
          en: "Advertising Material Production Factory"
        },
        curtain: {
          zh: "窗帘加工制作工厂",
          ja: "カーテン加工工場",
          en: "Curtain Production Factory"
        },
        wpc: {
          zh: "塑木板材料工厂",
          ja: "人工木デッキ材工場",
          en: "WPC Decking Material Factory"
        }
      };

      function setStatus(message, type) {
        status.textContent = message;
        status.className = "status" + (type ? " " + type : "");
      }

      function updateLoginUi() {
        if (token) {
          loginBtn.textContent = "已登录";
          loginBtn.disabled = true;
          inlineLoginBtn.textContent = "已登录";
          inlineLoginBtn.disabled = true;
          loginStrip.className = "login-strip ok";
          loginText.textContent = "已登录，可以直接上传并发布。";
        } else {
          loginBtn.textContent = "登录 GitHub";
          loginBtn.disabled = false;
          inlineLoginBtn.textContent = "先登录";
          inlineLoginBtn.disabled = false;
          loginStrip.className = "login-strip";
          loginText.textContent = "未登录。点击“上传并发布”会先打开 GitHub 登录。";
        }
      }

      function updateModuleNote() {
        var selected = moduleLabels[categoryInput.value] || moduleLabels.factory;
        var isFactory = categoryInput.value === "factory";
        channelField.className = isFactory ? "" : "hidden";
        if (isFactory) {
          var channel = channelLabels[channelInput.value] || channelLabels.wpc;
          moduleNote.textContent = "将显示在前台：" + selected.anchor + " → " + selected.zh + " → " + channel.zh;
          return;
        }
        moduleNote.textContent = "将显示在前台：" + selected.anchor + " → " + selected.zh + " / " + selected.ja + " / " + selected.en;
      }

      function applyChannelTitle() {
        if (categoryInput.value !== "factory") return;
        var channel = channelLabels[channelInput.value] || channelLabels.wpc;
        $("titleZh").value = channel.zh;
        $("titleJa").value = channel.ja;
        $("titleEn").value = channel.en;
        updateModuleNote();
      }

      function api(path, options) {
        if (!token) return Promise.reject(new Error("请先登录 GitHub。"));
        return fetch("https://api.github.com/repos/" + owner + "/" + repo + path, Object.assign({
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": "Bearer " + token,
            "X-GitHub-Api-Version": "2022-11-28"
          }
        }, options || {})).then(async function (res) {
          var text = await res.text();
          var data = text ? JSON.parse(text) : null;
          if (!res.ok) {
            throw new Error((data && data.message) || ("GitHub API error: " + res.status));
          }
          return data;
        });
      }

      function fileToBase64(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            resolve(String(reader.result).split(",")[1]);
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function safeSlug(text) {
        var ascii = String(text || "").toLowerCase().trim()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
        if (ascii) return ascii.slice(0, 60);
        return "record-" + nowStamp();
      }

      function nowStamp() {
        var d = new Date();
        var pad = function (n) { return String(n).padStart(2, "0"); };
        return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
      }

      function todayFileDate() {
        var d = new Date();
        var pad = function (n) { return String(n).padStart(2, "0"); };
        return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
      }

      function cleanFileName(file, index) {
        var ext = (file.name.match(/\.[a-z0-9]+$/i) || [""])[0].toLowerCase();
        var base = file.name.replace(/\.[^.]+$/u, "").toLowerCase()
          .replace(/[^a-z0-9\u4e00-\u9fa5ぁ-んァ-ン一-龥]+/gu, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 64) || "media";
        return nowStamp() + "-" + String(index + 1).padStart(2, "0") + "-" + base + ext;
      }

      function isVideo(fileOrPath) {
        var value = typeof fileOrPath === "string" ? fileOrPath : (fileOrPath.type || fileOrPath.name || "");
        return /video|\.mp4$|\.webm$/i.test(value);
      }

      function renderLocalPreviews() {
        previewGrid.innerHTML = "";
        var files = Array.from(filesInput.files || []);
        fileSummary.textContent = files.length ? "已选择 " + files.length + " 个文件。确认后点击“上传并发布”。" : "未选择文件。";
        if (files.length) setStatus("已选择 " + files.length + " 个文件。可以点击“上传并发布”。", "ok");
        files.forEach(function (file) {
          var card = document.createElement("div");
          card.className = "thumb";
          var media = isVideo(file) ? document.createElement("video") : document.createElement("img");
          media.src = URL.createObjectURL(file);
          if (media.tagName === "VIDEO") {
            media.controls = true;
            media.muted = true;
          }
          media.onload = media.onloadeddata = function () { URL.revokeObjectURL(media.src); };
          var label = document.createElement("span");
          label.textContent = file.name + " / " + Math.round(file.size / 1024) + "KB";
          card.appendChild(media);
          card.appendChild(label);
          previewGrid.appendChild(card);
        });
      }

      async function putFile(path, contentBase64, message, sha) {
        return api("/contents/" + encodeURIComponent(path).replace(/%2F/g, "/"), {
          method: "PUT",
          body: JSON.stringify({
            message: message,
            content: contentBase64,
            branch: branch,
            sha: sha || undefined
          })
        });
      }

      async function getContent(path) {
        return api("/contents/" + encodeURIComponent(path).replace(/%2F/g, "/") + "?ref=" + encodeURIComponent(branch));
      }

      async function publishRecord() {
        var category = $("category").value;
        var channel = category === "factory" ? $("channel").value : "site";
        var titleZh = $("titleZh").value.trim();
        var titleJa = $("titleJa").value.trim();
        var titleEn = $("titleEn").value.trim();
        var files = Array.from(filesInput.files || []);

        if (!token) {
          setStatus("需要先登录 GitHub。若浏览器拦截弹窗，会自动改为当前页面登录。登录后请重新选择文件上传。", "warn");
          pendingPublish = true;
          login();
          return;
        }
        if (!titleZh) return setStatus("请填写中文大标题。", "warn");
        if (!files.length) {
          setStatus("请先点击“选择图片 / 视频（可多选）”，选择至少一个文件。", "warn");
          selectFilesBtn.focus();
          return;
        }
        var oversized = files.filter(function (file) { return isVideo(file) && file.size > 25 * 1024 * 1024; });
        if (oversized.length) return setStatus("视频太大。请先压缩到 25MB 以下 MP4/WebM。", "warn");

        publishBtn.disabled = true;
        try {
          var mediaPaths = [];
          for (var i = 0; i < files.length; i += 1) {
            var file = files[i];
            setStatus("正在上传媒体 " + (i + 1) + " / " + files.length + "：" + file.name);
            var mediaPath = "media/records/" + category + "/" + channel + "/" + cleanFileName(file, i);
            await putFile(mediaPath, await fileToBase64(file), "upload supply record media");
            mediaPaths.push("/" + mediaPath);
          }

          var slug = safeSlug(titleEn || titleZh);
          var stamp = nowStamp();
          var fileName = todayFileDate() + "-" + stamp + "-" + slug + ".json";
          var record = {
            category: category,
            channel: channel,
            slug: slug + "-" + stamp,
            title: titleZh,
            date: todayFileDate().replace(/-/g, "."),
            showOnHome: true,
            media: mediaPaths,
            zh: { title: titleZh },
            ja: { title: titleJa || titleZh },
            en: { title: titleEn || titleZh }
          };
          var json = JSON.stringify(record, null, 2) + "\n";
          await putFile("data/supply-chain-records/" + fileName, btoa(unescape(encodeURIComponent(json))), "create supply record");
          setStatus("发布成功。已上传 " + mediaPaths.length + " 个媒体，并创建前台记录。Vercel 会随后自动部署。", "ok");
          clearForm();
          await loadRecords();
        } catch (error) {
          setStatus("发布失败：" + error.message, "warn");
        } finally {
          publishBtn.disabled = false;
        }
      }

      function clearForm() {
        $("titleZh").value = "";
        $("titleJa").value = "";
        $("titleEn").value = "";
        filesInput.value = "";
        fileSummary.textContent = "未选择文件。";
        previewGrid.innerHTML = "";
      }

      async function loadRecords() {
        recordList.innerHTML = "";
        if (!token) {
          recordList.innerHTML = '<p class="hint">登录后显示记录。</p>';
          return;
        }
        try {
          var files = await getContent("data/supply-chain-records");
          var jsonFiles = files.filter(function (item) { return item.name.endsWith(".json"); })
            .sort(function (a, b) { return b.name.localeCompare(a.name); });
          if (!jsonFiles.length) {
            recordList.innerHTML = '<p class="hint">暂无记录。</p>';
            return;
          }
          var grouped = {};
          for (var i = 0; i < jsonFiles.length; i += 1) {
            var item = jsonFiles[i];
            var detail = await getContent(item.path);
            var content = JSON.parse(decodeURIComponent(escape(atob(detail.content.replace(/\s/g, "")))));
            var category = content.category === "site" ? "site" : "factory";
            var groupKey = category === "factory" ? (content.channel || inferChannel(content)) : "site";
            if (!grouped[groupKey]) grouped[groupKey] = [];
            grouped[groupKey].push({ item: item, content: content });
          }
          renderRecordGroup("advertising", grouped.advertising || []);
          renderRecordGroup("curtain", grouped.curtain || []);
          renderRecordGroup("wpc", grouped.wpc || []);
          renderRecordGroup("site", grouped.site || []);
        } catch (error) {
          recordList.innerHTML = '<p class="hint">读取失败：' + error.message + '</p>';
        }
      }

      function inferChannel(content) {
        var value = String(content.channel || content.slug || content.title || "").toLowerCase();
        if (value.indexOf("wpc") !== -1 || value.indexOf("塑木") !== -1 || value.indexOf("デッキ") !== -1) return "wpc";
        if (value.indexOf("advertising") !== -1 || value.indexOf("广告") !== -1 || value.indexOf("広告") !== -1) return "advertising";
        if (value.indexOf("curtain") !== -1 || value.indexOf("窗帘") !== -1 || value.indexOf("カーテン") !== -1) return "curtain";
        return "advertising";
      }

      function renderRecordGroup(category, records) {
        var label = channelLabels[category] || moduleLabels[category] || moduleLabels.factory;
        var group = document.createElement("div");
        group.className = "stack";
        group.innerHTML = '<h3>' + escapeHtml(label.zh) + '</h3>';
        if (!records.length) {
          group.innerHTML += '<p class="hint">这个前台板块暂无记录。</p>';
          recordList.appendChild(group);
          return;
        }
        records.forEach(function (record) {
          renderRecord(record.item, record.content, group);
        });
        recordList.appendChild(group);
      }

      function renderRecord(item, content, target) {
        var card = document.createElement("div");
        card.className = "record";
        var mediaCount = Array.isArray(content.media) ? content.media.length : (content.media ? 1 : 0);
        card.innerHTML =
          '<h3>' + escapeHtml(content.title || item.name) + '</h3>' +
          '<small>' + escapeHtml(item.name) + '</small>' +
          '<div><span class="media-count">' + mediaCount + '</span> 个媒体 / 前台：' + escapeHtml((moduleLabels[content.category] || moduleLabels.factory).zh) + ' / ' + escapeHtml((channelLabels[content.channel] || channelLabels[inferChannel(content)] || { zh: "" }).zh) + '</div>' +
          '<div class="actions"><button class="danger" type="button">删除记录</button></div>';
        card.querySelector("button").addEventListener("click", function () { deleteRecord(item.path, item.sha, content.title || item.name); });
        target.appendChild(card);
      }

      async function deleteRecord(path, sha, title) {
        if (!token) return setStatus("请先登录。", "warn");
        if (!window.confirm("确定删除记录：" + title + "？\n只删除记录 JSON，不删除已上传媒体文件。")) return;
        try {
          await api("/contents/" + encodeURIComponent(path).replace(/%2F/g, "/"), {
            method: "DELETE",
            body: JSON.stringify({
              message: "delete supply record",
              sha: sha,
              branch: branch
            })
          });
          setStatus("已删除记录。Vercel 会随后自动部署。", "ok");
          await loadRecords();
        } catch (error) {
          setStatus("删除失败：" + error.message, "warn");
        }
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (ch) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[ch];
        });
      }

      function login() {
        var authUrl = "/api/auth?scope=repo";
        popup = window.open(authUrl, "kyokenGithubLogin", "width=720,height=720");
        if (!popup) {
          setStatus("浏览器拦截了登录窗口。现在改为当前页面登录；登录回来后请重新选择文件上传。", "warn");
          window.location.href = authUrl;
          return;
        }
        setStatus("GitHub 登录窗口已打开。登录完成后会自动回到后台。");
      }

      window.addEventListener("error", function (event) {
        setStatus("后台脚本错误：" + (event.message || "未知错误") + "。请刷新页面后重试。", "warn");
      });

      window.addEventListener("message", function (event) {
        var data = String(event.data || "");
        if (data === "authorizing:github" && popup) {
          popup.postMessage("ready", "*");
          return;
        }
        if (data.indexOf("authorization:github:success:") === 0) {
          var payload = JSON.parse(data.slice("authorization:github:success:".length));
          token = payload.token;
          sessionStorage.setItem(tokenKey, token);
          updateLoginUi();
          setStatus("已登录。可以新增记录。", "ok");
          loadRecords();
          if (pendingPublish) {
            pendingPublish = false;
            publishRecord();
          }
        }
        if (data.indexOf("authorization:github:error:") === 0) {
          setStatus("GitHub 登录失败。", "warn");
        }
      });

      loginBtn.addEventListener("click", login);
      inlineLoginBtn.addEventListener("click", login);
      reloadBtn.addEventListener("click", loadRecords);
      publishBtn.addEventListener("click", publishRecord);
      clearBtn.addEventListener("click", clearForm);
      selectFilesBtn.addEventListener("click", function () { filesInput.click(); });
      filesInput.addEventListener("change", renderLocalPreviews);
      categoryInput.addEventListener("change", function () {
        updateModuleNote();
        applyChannelTitle();
      });
      channelInput.addEventListener("change", applyChannelTitle);

      updateModuleNote();
      applyChannelTitle();
      if (token) {
        updateLoginUi();
        setStatus("已读取本机登录状态。", "ok");
        loadRecords();
      } else {
        updateLoginUi();
        loadRecords();
      }
    })();
  </script>
</body>
</html>
