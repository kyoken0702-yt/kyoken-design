<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>京建供应链 CMS</title>
</head>
<body>
  <!-- Decap CMS. Replace auth settings in config.yml if the GitHub auth provider changes. -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js?v=20260706-modules2"></script>
  <script>
    window.setInterval(function () {
      document.querySelectorAll('input[type="file"]').forEach(function (input) {
        if (!input.accept) input.accept = 'image/jpeg,image/png,image/webp,video/mp4';
      });
    }, 1000);
  </script>
</body>
</html>
