<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>京建供应链记录后台</title>
  <style>
    :root {
      --navy: #071a3a;
      --blue: #183965;
      --paper: #f4f6f8;
      --line: #d8dee8;
      --text: #111827;
      --muted: #4b5563;
      --red: #a51e32;
      --green: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 17px;
      line-height: 1.6;
    }
    h1, h2, h3, p { margin: 0; }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 16px clamp(16px, 4vw, 42px);
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    h1 { color: var(--navy); font-size: clamp(24px, 3vw, 36px); font-weight: 800; }
    h2 { color: var(--navy); font-size: 23px; font-weight: 800; }
    h3 { color: var(--navy); font-size: 18px; font-weight: 800; }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(330px, .9fr);
      gap: 18px;
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: 20px 16px 52px;
    }
    .panel {
      display: grid;
      gap: 15px;
      align-content: start;
      padding: clamp(16px, 2.5vw, 24px);
      background: #fff;
      border: 1px solid var(--line);
    }
    .top-note, .hint { color: var(--muted); font-weight: 600; }
    .hint { font-size: 14px; }
    label { display: grid; gap: 7px; color: var(--navy); font-weight: 800; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #c8d1df;
      background: #fff;
      color: var(--text);
      padding: 12px 13px;
      font: inherit;
      font-weight: 800;
      border-radius: 0;
    }
    textarea { min-height: 86px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      outline: 3px solid rgba(24, 57, 101, .14);
      border-color: var(--blue);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button, .button-like {
      border: 1px solid var(--navy);
      background: var(--navy);
      color: #fff;
      padding: 12px 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      border-radius: 0;
    }
    button.secondary, .button-like.secondary { background: #fff; color: var(--navy); }
    button.danger { border-color: var(--red); background: #fff; color: var(--red); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status {
      min-height: 52px;
      padding: 13px 15px;
      border-left: 5px solid var(--blue);
      background: #eef4ff;
      color: var(--navy);
      font-weight: 700;
      white-space: pre-wrap;
    }
    .status.ok { border-color: var(--green); background: #ecfdf5; color: #065f46; }
    .status.warn { border-color: var(--red); background: #fff1f2; color: #9f1239; }
    .login-strip {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid #ead49a;
      background: #fff8e6;
      color: var(--navy);
      font-weight: 700;
    }
    .login-strip.ok {
      border-color: #a7f3d0;
      background: #ecfdf5;
      color: #065f46;
    }
    .file-box {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px dashed #9aa9bf;
      background: #f8fafc;
    }
    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .preview-grid, .record-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .thumb, .record {
      min-width: 0;
      padding: 9px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .thumb img, .thumb video {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #dbe3ee;
    }
    .thumb span, .record small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      word-break: break-all;
    }
    .record {
      display: grid;
      gap: 9px;
    }
    .record strong { color: var(--red); }
    .progress {
      overflow: hidden;
      height: 12px;
      border: 1px solid #c8d1df;
      background: #fff;
    }
    .progress > div {
      width: 0%;
      height: 100%;
      background: var(--red);
      transition: width .2s ease;
    }
    @media (max-width: 880px) {
      header { position: static; flex-direction: column; }
      main { grid-template-columns: 1fr; }
      .actions button, .button-like { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>京建供应链记录后台</h1>
      <p class="top-note">先选前台模块，再选材料通道；发布后前台同名模块会显示。</p>
    </div>
    <div class="actions">
      <button id="loginBtn" type="button">登录 GitHub</button>
      <button id="reloadBtn" class="secondary" type="button">刷新记录</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>发布新记录</h2>
      <div id="status" class="status">请先登录。可以先选择图片预览。</div>
      <div id="progress" class="progress"><div></div></div>
      <div id="loginStrip" class="login-strip">
        <span id="loginText">未登录。发布前需要登录 GitHub。</span>
        <button id="inlineLoginBtn" type="button">先登录</button>
      </div>

      <label>
        选择前台模块
        <select id="module">
          <option value="factory">中国工厂・供应链实景</option>
          <option value="site">日本现场记录</option>
        </select>
      </label>

      <label id="channelField">
        材料上传通道
        <select id="channel">
          <option value="advertising">广告材料制作工厂</option>
          <option value="curtain">窗帘加工制作工厂</option>
          <option value="wpc">塑木板材料工厂</option>
        </select>
        <span class="hint">选择后会自动填写标题和说明；前台会显示在同名工厂模块里。</span>
      </label>

      <label>
        标题
        <input id="title" type="text" placeholder="例如：广告材料制作工厂">
      </label>

      <label>
        简短说明（可选）
        <textarea id="summary" placeholder="例如：材料、包装、出货前状态记录。"></textarea>
      </label>

      <div class="file-box">
        <strong>上传图片 / 视频</strong>
        <button id="selectFilesBtn" class="secondary" type="button">选择图片 / 视频（可多选）</button>
        <input id="files" class="file-input" type="file" multiple accept="image/jpeg,image/png,image/webp,video/mp4,video/webm">
        <span id="fileSummary" class="hint">未选择文件。</span>
        <span class="hint">支持 JPG / PNG / WebP / 小 MP4 / WebM。HEIC / MOV 请先转 JPG / MP4。图片会在浏览器本地压缩到长边约 1800px、JPG quality 0.78。</span>
      </div>

      <div id="previewGrid" class="preview-grid"></div>

      <div class="actions">
        <button id="publishBtn" type="button">上传并发布</button>
        <button id="clearBtn" class="secondary" type="button">清空表单</button>
      </div>
    </section>

    <aside class="panel">
      <h2>当前前台记录</h2>
      <p class="hint">这里读取 data/records.json。删除只从前台索引移除，不删除已上传媒体文件。</p>
      <div id="recordList" class="record-grid"></div>
    </aside>
  </main>

  <script>
    (function () {
      var owner = "kyoken0702-yt";
      var repo = "kyoken-design";
      var branch = "master";
      var recordsPath = "data/records.json";
      var tokenKey = "kyoken_supply_admin_token";
      var token = sessionStorage.getItem(tokenKey) || "";
      var popup = null;
      var records = [];

      var $ = function (id) { return document.getElementById(id); };
      var status = $("status");
      var progressBar = $("progress").firstElementChild;
      var loginBtn = $("loginBtn");
      var inlineLoginBtn = $("inlineLoginBtn");
      var loginStrip = $("loginStrip");
      var loginText = $("loginText");
      var reloadBtn = $("reloadBtn");
      var publishBtn = $("publishBtn");
      var clearBtn = $("clearBtn");
      var selectFilesBtn = $("selectFilesBtn");
      var filesInput = $("files");
      var fileSummary = $("fileSummary");
      var previewGrid = $("previewGrid");
      var recordList = $("recordList");
      var moduleInput = $("module");
      var channelInput = $("channel");
      var channelField = $("channelField");

      var moduleLabels = {
        factory: "中国工厂・供应链实景",
        site: "日本现场记录"
      };

      var channelLabels = {
        advertising: {
          title: "广告材料制作工厂",
          summary: "广告材料制作、出货前确认、包装状态记录。",
          i18n: {
            ja: { title: "広告材料制作工場", summary: "広告材料制作、出荷前確認、包装状態の記録。" },
            zh: { title: "广告材料制作工厂", summary: "广告材料制作、出货前确认、包装状态记录。" },
            en: { title: "Advertising Material Production Factory", summary: "Advertising material production, pre-shipment check, and packing status record." }
          }
        },
        curtain: {
          title: "窗帘加工制作工厂",
          summary: "窗帘材料、加工、包装状态记录。",
          i18n: {
            ja: { title: "カーテン加工工場", summary: "カーテン資材、加工、包装状態の記録。" },
            zh: { title: "窗帘加工制作工厂", summary: "窗帘材料、加工、包装状态记录。" },
            en: { title: "Curtain Production Factory", summary: "Curtain material, processing, and packing status record." }
          }
        },
        wpc: {
          title: "塑木板材料工厂",
          summary: "人工木地板材料、工厂库存与出货前状态记录。",
          i18n: {
            ja: { title: "人工木デッキ材工場", summary: "人工木デッキ材、工場在庫、出荷前状態の記録。" },
            zh: { title: "塑木板材料工厂", summary: "人工木地板材料、工厂库存与出货前状态记录。" },
            en: { title: "WPC Decking Material Factory", summary: "WPC decking material, factory stock, and pre-shipment status record." }
          }
        }
      };

      function setStatus(message, type) {
        status.textContent = message;
        status.className = "status" + (type ? " " + type : "");
      }

      function setProgress(done, total) {
        var pct = total ? Math.round((done / total) * 100) : 0;
        progressBar.style.width = Math.max(0, Math.min(100, pct)) + "%";
      }

      function updateLoginUi() {
        if (token) {
          loginBtn.textContent = "已登录";
          loginBtn.disabled = true;
          inlineLoginBtn.textContent = "已登录";
          inlineLoginBtn.disabled = true;
          loginStrip.className = "login-strip ok";
          loginText.textContent = "已登录，可以发布。";
        } else {
          loginBtn.textContent = "登录 GitHub";
          loginBtn.disabled = false;
          inlineLoginBtn.textContent = "先登录";
          inlineLoginBtn.disabled = false;
          loginStrip.className = "login-strip";
          loginText.textContent = "未登录。发布前需要登录 GitHub。";
        }
      }

      function syncModuleFields(forceTitle) {
        var isFactory = moduleInput.value === "factory";
        channelField.style.display = isFactory ? "grid" : "none";
        if (isFactory) {
          var channel = channelLabels[channelInput.value] || channelLabels.advertising;
          if (forceTitle || !$("title").value.trim()) $("title").value = channel.title;
          if (forceTitle || !$("summary").value.trim()) $("summary").value = channel.summary;
          setStatus("将发布到前台：" + moduleLabels.factory + " → " + channel.title + "。", "ok");
        } else {
          if (forceTitle || !$("title").value.trim()) $("title").value = "日本现场到场记录";
          if (forceTitle || !$("summary").value.trim()) $("summary").value = "材料到场、尺寸确认、安装前确认或交付状态记录。";
          setStatus("将发布到前台：" + moduleLabels.site + "。", "ok");
        }
      }

      function api(path, options) {
        if (!token) return Promise.reject(new Error("请先登录 GitHub。"));
        return fetch("https://api.github.com/repos/" + owner + "/" + repo + path, Object.assign({
          headers: {
            Accept: "application/vnd.github+json",
            Authorization: "Bearer " + token,
            "X-GitHub-Api-Version": "2022-11-28"
          }
        }, options || {})).then(async function (res) {
          var text = await res.text();
          var data = text ? JSON.parse(text) : null;
          if (!res.ok) throw new Error((data && data.message) || ("GitHub API error: " + res.status));
          return data;
        });
      }

      function decodeBase64(content) {
        return decodeURIComponent(escape(atob(String(content || "").replace(/\s/g, ""))));
      }

      async function getContent(path) {
        return api("/contents/" + encodeURIComponent(path).replace(/%2F/g, "/") + "?ref=" + encodeURIComponent(branch));
      }

      async function loadRecords() {
        recordList.innerHTML = "";
        if (!token) {
          recordList.innerHTML = '<p class="hint">登录后显示记录。</p>';
          return;
        }
        try {
          var file = await getContent(recordsPath);
          records = JSON.parse(decodeBase64(file.content));
          renderRecords();
          setStatus("已读取前台记录 " + records.length + " 条。", "ok");
        } catch (error) {
          recordList.innerHTML = '<p class="hint">读取失败：' + escapeHtml(error.message) + '</p>';
          setStatus("读取 records.json 失败：" + error.message, "warn");
        }
      }

      function renderRecords() {
        recordList.innerHTML = "";
        if (!records.length) {
          recordList.innerHTML = '<p class="hint">暂无记录。</p>';
          return;
        }
        records.forEach(function (record) {
          var card = document.createElement("div");
          card.className = "record";
          var mediaCount = Array.isArray(record.media) ? record.media.length : 0;
          var moduleText = record.module === "site" ? "日本现场记录" : "中国工厂・供应链实景";
          var channelText = record.module === "factory" && record.channel && channelLabels[record.channel] ? " / " + channelLabels[record.channel].title : "";
          card.innerHTML = '<h3>' + escapeHtml(record.title || "未命名记录") + '</h3>' +
            '<small>' + escapeHtml(moduleText + channelText) + '</small>' +
            '<div><strong>' + mediaCount + '</strong> 个媒体</div>' +
            '<small>' + escapeHtml(record.id || "") + '</small>' +
            '<button class="danger" type="button">从前台移除</button>';
          card.querySelector("button").addEventListener("click", function () { deleteRecord(record.id); });
          recordList.appendChild(card);
        });
      }

      function bytesText(size) {
        if (size > 1024 * 1024) return (size / 1024 / 1024).toFixed(1) + "MB";
        return Math.max(1, Math.round(size / 1024)) + "KB";
      }

      function nowStamp() {
        var d = new Date();
        var pad = function (n) { return String(n).padStart(2, "0"); };
        return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
      }

      function slugify(text) {
        var ascii = String(text || "").toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
        return (ascii || "record").slice(0, 54);
      }

      function cleanFileName(file, index, ext) {
        var suffix = ext || (file.name.match(/\.[a-z0-9]+$/i) || [""])[0].toLowerCase();
        var base = file.name.replace(/\.[^.]+$/u, "").toLowerCase()
          .replace(/[^a-z0-9\u4e00-\u9fa5ぁ-んァ-ン一-龥]+/gu, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 54) || "media";
        return nowStamp() + "-" + String(index + 1).padStart(2, "0") + "-" + base + suffix;
      }

      function isVideo(fileOrPath) {
        var value = typeof fileOrPath === "string" ? fileOrPath : (fileOrPath.type || fileOrPath.name || "");
        return /video|\.mp4$|\.webm$/i.test(value);
      }

      function isAllowed(file) {
        return /^image\/(jpeg|jpg|png|webp)$/i.test(file.type || "") ||
          /^video\/(mp4|webm)$/i.test(file.type || "") ||
          /\.(jpe?g|png|webp|mp4|webm)$/i.test(file.name || "");
      }

      function fileToBase64(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () { resolve(String(reader.result).split(",")[1]); };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function compressImage(file) {
        return new Promise(function (resolve, reject) {
          if (!/^image\/(jpeg|jpg|png|webp)$/i.test(file.type || "") && !/\.(jpe?g|png|webp)$/i.test(file.name || "")) {
            resolve({ file: file, originalSize: file.size, compressed: false });
            return;
          }
          var image = new Image();
          var objectUrl = URL.createObjectURL(file);
          image.onload = function () {
            URL.revokeObjectURL(objectUrl);
            var maxSide = 1800;
            var width = image.naturalWidth || image.width;
            var height = image.naturalHeight || image.height;
            var scale = Math.min(1, maxSide / Math.max(width, height));
            var canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(width * scale));
            canvas.height = Math.max(1, Math.round(height * scale));
            var ctx = canvas.getContext("2d", { alpha: false });
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(function (blob) {
              if (!blob) return resolve({ file: file, originalSize: file.size, compressed: false });
              var output = new File([blob], file.name.replace(/\.[^.]+$/u, "") + ".jpg", { type: "image/jpeg" });
              if (output.size >= file.size) return resolve({ file: file, originalSize: file.size, compressed: false });
              resolve({ file: output, originalSize: file.size, compressedSize: output.size, compressed: true });
            }, "image/jpeg", 0.78);
          };
          image.onerror = function () {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("图片无法在浏览器内压缩：" + file.name + "。请先转成 JPG / PNG / WebP。"));
          };
          image.src = objectUrl;
        });
      }

      function renderLocalPreviews() {
        previewGrid.innerHTML = "";
        var files = Array.from(filesInput.files || []);
        var rejected = files.filter(function (file) { return !isAllowed(file); });
        if (rejected.length) {
          setStatus("有不支持的文件：" + rejected.map(function (file) { return file.name; }).join("、") + "。HEIC / MOV 请先转换。", "warn");
        } else if (files.length) {
          setStatus("已选择 " + files.length + " 个文件。每张图片大小已显示，发布前会自动压缩。", "ok");
        }
        fileSummary.textContent = files.length ? "已选择 " + files.length + " 个文件，总大小 " + bytesText(files.reduce(function (sum, file) { return sum + file.size; }, 0)) + "。" : "未选择文件。";
        files.forEach(function (file) {
          var card = document.createElement("div");
          card.className = "thumb";
          var media = isVideo(file) ? document.createElement("video") : document.createElement("img");
          media.src = URL.createObjectURL(file);
          if (media.tagName === "VIDEO") {
            media.controls = true;
            media.muted = true;
          }
          media.onload = media.onloadeddata = function () { URL.revokeObjectURL(media.src); };
          var label = document.createElement("span");
          label.textContent = file.name + " / " + bytesText(file.size);
          card.appendChild(media);
          card.appendChild(label);
          previewGrid.appendChild(card);
        });
      }

      async function createBlob(content, encoding) {
        var blob = await api("/git/blobs", {
          method: "POST",
          body: JSON.stringify({ content: content, encoding: encoding })
        });
        return blob.sha;
      }

      function cleanGitPath(path) {
        var value = String(path || "").replace(/^\/+/, "");
        if (!value || value.indexOf("..") !== -1 || value.indexOf(".git/") === 0) throw new Error("Invalid path: " + path);
        return value;
      }

      async function commitBundle(uploadFiles, nextRecords, message) {
        var ref = await api("/git/ref/heads/" + branch);
        var baseCommitSha = ref.object.sha;
        var baseCommit = await api("/git/commits/" + baseCommitSha);
        var tree = [];
        for (var i = 0; i < uploadFiles.length; i += 1) {
          setStatus("正在准备一次性提交：" + (i + 1) + " / " + uploadFiles.length);
          setProgress(i + 1, uploadFiles.length + 1);
          tree.push({
            path: cleanGitPath(uploadFiles[i].path),
            mode: "100644",
            type: "blob",
            sha: await createBlob(uploadFiles[i].content, "base64")
          });
        }
        tree.push({
          path: recordsPath,
          mode: "100644",
          type: "blob",
          sha: await createBlob(JSON.stringify(nextRecords, null, 2) + "\n", "utf-8")
        });
        setProgress(uploadFiles.length + 1, uploadFiles.length + 1);
        var newTree = await api("/git/trees", {
          method: "POST",
          body: JSON.stringify({ base_tree: baseCommit.tree.sha, tree: tree })
        });
        var newCommit = await api("/git/commits", {
          method: "POST",
          body: JSON.stringify({ message: message, tree: newTree.sha, parents: [baseCommitSha] })
        });
        await api("/git/refs/heads/" + branch, {
          method: "PATCH",
          body: JSON.stringify({ sha: newCommit.sha, force: false })
        });
        return newCommit;
      }

      async function publishRecord() {
        if (!token) {
          setStatus("需要先登录 GitHub。登录后请重新确认文件选择。", "warn");
          login();
          return;
        }
        var moduleName = moduleInput.value;
        var channelName = moduleName === "factory" ? channelInput.value : "site";
        var channelMeta = channelLabels[channelName];
        var title = $("title").value.trim();
        var summary = $("summary").value.trim();
        var files = Array.from(filesInput.files || []);
        if (!title) return setStatus("请填写标题。", "warn");
        if (!files.length) return setStatus("请先选择至少一张图片或一个小视频。", "warn");
        var unsupported = files.filter(function (file) { return !isAllowed(file); });
        if (unsupported.length) return setStatus("不支持这些文件：" + unsupported.map(function (file) { return file.name; }).join("、") + "。HEIC / MOV 请先转换。", "warn");
        var oversizedVideos = files.filter(function (file) { return isVideo(file) && file.size > 25 * 1024 * 1024; });
        if (oversizedVideos.length) return setStatus("视频太大，请先压缩到 25MB 以下 MP4 / WebM。", "warn");

        publishBtn.disabled = true;
        setProgress(0, 1);
        try {
          if (!records.length) {
            var existing = await getContent(recordsPath);
            records = JSON.parse(decodeBase64(existing.content));
          }
          var stamp = nowStamp();
          var id = slugify(title) + "-" + stamp;
          var mediaPaths = [];
          var uploadFiles = [];
          var savedBytes = 0;
          for (var i = 0; i < files.length; i += 1) {
            var source = files[i];
            setStatus("正在压缩 / 读取媒体 " + (i + 1) + " / " + files.length + "：" + source.name);
            var prepared = isVideo(source) ? { file: source, originalSize: source.size, compressed: false } : await compressImage(source);
            if (prepared.compressed) savedBytes += prepared.originalSize - prepared.compressedSize;
            var preparedFile = prepared.file;
            var mediaBase = moduleName === "factory"
              ? "media/records/factory/" + channelName + "/" + id
              : "media/records/site/" + id;
            var mediaPath = mediaBase + "/" + cleanFileName(preparedFile, i, isVideo(preparedFile) ? null : ".jpg");
            uploadFiles.push({ path: mediaPath, content: await fileToBase64(preparedFile) });
            mediaPaths.push("/" + mediaPath);
            setProgress(i + 1, files.length * 2 + 1);
          }
          var record = {
            id: id,
            module: moduleName,
            channel: channelName,
            title: title,
            summary: summary,
            i18n: channelMeta ? channelMeta.i18n : undefined,
            createdAt: new Date().toISOString(),
            media: mediaPaths
          };
          var nextRecords = [record].concat(records);
          setStatus("正在发布：媒体 " + uploadFiles.length + " 个 + records.json 1 个。");
          try {
            await commitBundle(uploadFiles, nextRecords, "publish kyoken supply record");
          } catch (error) {
            if (!/reference|fast-forward|sha|conflict/i.test(error.message)) throw error;
            setStatus("远端刚好有新提交，正在重读 records.json 后重试一次。");
            var fresh = await getContent(recordsPath);
            var freshRecords = JSON.parse(decodeBase64(fresh.content));
            await commitBundle(uploadFiles, [record].concat(freshRecords), "publish kyoken supply record");
          }
          records = nextRecords;
          renderRecords();
          setStatus("发布成功。前台会显示这条记录。图片已自动压缩" + (savedBytes ? "，约减少 " + bytesText(savedBytes) : "") + "。Vercel 会随后自动部署。", "ok");
          clearForm();
        } catch (error) {
          setStatus("发布失败：" + error.message, "warn");
        } finally {
          publishBtn.disabled = false;
        }
      }

      async function deleteRecord(id) {
        if (!token) return setStatus("请先登录。", "warn");
        var target = records.find(function (record) { return record.id === id; });
        if (!target) return;
        if (!window.confirm("确定从前台移除这条记录？\n" + target.title + "\n媒体文件会保留。")) return;
        publishBtn.disabled = true;
        try {
          var nextRecords = records.filter(function (record) { return record.id !== id; });
          await commitBundle([], nextRecords, "remove kyoken supply record");
          records = nextRecords;
          renderRecords();
          setStatus("已从前台移除记录。Vercel 会随后自动部署。", "ok");
        } catch (error) {
          setStatus("删除失败：" + error.message, "warn");
        } finally {
          publishBtn.disabled = false;
        }
      }

      function clearForm() {
        $("title").value = "";
        $("summary").value = "";
        filesInput.value = "";
        previewGrid.innerHTML = "";
        fileSummary.textContent = "未选择文件。";
        setProgress(0, 1);
        syncModuleFields(false);
      }

      function login() {
        var isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        var authBase = isLocal ? "" : "https://kyoken.design";
        var authUrl = authBase + "/api/auth?scope=repo&return_origin=" + encodeURIComponent(window.location.origin);
        popup = window.open(authUrl, "kyoken_github_login", "width=720,height=760");
        if (!popup) window.location.href = authUrl;
      }

      window.addEventListener("message", function (event) {
        if (event.data === "authorizing:github" && popup) {
          popup.postMessage("ready", event.origin);
          return;
        }
        if (typeof event.data !== "string" || event.data.indexOf("authorization:github:") !== 0) return;
        var parts = event.data.split(":");
        var state = parts[2];
        var payloadText = event.data.slice(("authorization:github:" + state + ":").length);
        if (state === "success") {
          var payload = JSON.parse(payloadText);
          token = payload.token;
          sessionStorage.setItem(tokenKey, token);
          updateLoginUi();
          loadRecords();
        } else {
          setStatus("GitHub 登录失败。", "warn");
        }
      });

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (ch) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[ch];
        });
      }

      selectFilesBtn.addEventListener("click", function () { filesInput.click(); });
      filesInput.addEventListener("change", renderLocalPreviews);
      moduleInput.addEventListener("change", function () { syncModuleFields(true); });
      channelInput.addEventListener("change", function () { syncModuleFields(true); });
      publishBtn.addEventListener("click", publishRecord);
      clearBtn.addEventListener("click", clearForm);
      reloadBtn.addEventListener("click", loadRecords);
      loginBtn.addEventListener("click", login);
      inlineLoginBtn.addEventListener("click", login);

      updateLoginUi();
      syncModuleFields(false);
      if (token) loadRecords();
    })();
  </script>
</body>
</html>
