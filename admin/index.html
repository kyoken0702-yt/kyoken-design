<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>京建供应链记录后台</title>
  <style>
    :root {
      --navy: #071a3a;
      --blue: #183965;
      --paper: #f4f6f8;
      --line: #d8dee8;
      --text: #111827;
      --muted: #4b5563;
      --red: #a51e32;
      --green: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 17px;
      line-height: 1.6;
    }
    h1, h2, h3, p { margin: 0; }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 16px clamp(16px, 4vw, 42px);
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    h1 { color: var(--navy); font-size: clamp(24px, 3vw, 36px); font-weight: 700; }
    h2 { color: var(--navy); font-size: 23px; font-weight: 700; }
    h3 { color: var(--navy); font-size: 18px; font-weight: 600; }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(330px, .9fr);
      gap: 18px;
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: 20px 16px 52px;
    }
    .panel {
      display: grid;
      gap: 15px;
      align-content: start;
      padding: clamp(16px, 2.5vw, 24px);
      background: #fff;
      border: 1px solid var(--line);
    }
    .top-note, .hint { color: var(--muted); font-weight: 400; }
    .hint { font-size: 14px; }
    label { display: grid; gap: 7px; color: var(--navy); font-weight: 600; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #c8d1df;
      background: #fff;
      color: var(--text);
      padding: 12px 13px;
      font: inherit;
      font-weight: 600;
      border-radius: 0;
    }
    textarea { min-height: 86px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      outline: 3px solid rgba(24, 57, 101, .14);
      border-color: var(--blue);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button, .button-like {
      border: 1px solid var(--navy);
      background: var(--navy);
      color: #fff;
      padding: 12px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0;
    }
    button.secondary, .button-like.secondary { background: #fff; color: var(--navy); }
    button.danger { border-color: var(--red); background: #fff; color: var(--red); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status {
      min-height: 52px;
      padding: 13px 15px;
      border-left: 5px solid var(--blue);
      background: #eef4ff;
      color: var(--navy);
      font-weight: 500;
      white-space: pre-wrap;
    }
    .status.ok { border-color: var(--green); background: #ecfdf5; color: #065f46; }
    .status.warn { border-color: var(--red); background: #fff1f2; color: #9f1239; }
    .login-strip {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid #ead49a;
      background: #fff8e6;
      color: var(--navy);
      font-weight: 500;
    }
    .login-strip.ok {
      border-color: #a7f3d0;
      background: #ecfdf5;
      color: #065f46;
    }
    .file-box {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px dashed #9aa9bf;
      background: #f8fafc;
    }
    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .preview-grid, .record-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .thumb, .record {
      min-width: 0;
      padding: 9px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .thumb img, .thumb video {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #dbe3ee;
    }
    .thumb span, .record small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      word-break: break-all;
    }
	    .record {
	      display: grid;
	      gap: 9px;
	    }
	    .record strong { color: var(--red); }
	    .media-editor {
	      display: none;
	      gap: 10px;
	      padding: 10px;
	      border: 1px solid #d8dee8;
	      background: #f8fafc;
	    }
	    .media-editor.open { display: grid; }
	    .media-actions {
	      display: flex;
	      flex-wrap: wrap;
	      gap: 8px;
	    }
	    .media-grid {
	      display: grid;
	      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
	      gap: 8px;
	    }
	    .media-item {
	      display: grid;
	      gap: 6px;
	      padding: 6px;
	      border: 1px solid var(--line);
	      background: #fff;
	    }
	    .media-item img,
	    .media-item video {
	      display: block;
	      width: 100%;
	      aspect-ratio: 4 / 3;
	      object-fit: cover;
	      background: #dbe3ee;
	    }
	    .media-item label {
	      display: flex;
	      gap: 6px;
	      align-items: center;
	      color: var(--muted);
	      font-size: 12px;
	      font-weight: 600;
	      word-break: break-all;
	    }
	    .media-item input { width: auto; }
	    .progress {
      overflow: hidden;
      height: 12px;
      border: 1px solid #c8d1df;
      background: #fff;
    }
    .progress > div {
      width: 0%;
      height: 100%;
      background: var(--red);
      transition: width .2s ease;
    }
    @media (max-width: 880px) {
      header { position: static; flex-direction: column; }
      main { grid-template-columns: 1fr; }
      .actions button, .button-like { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>京建供应链记录后台</h1>
      <p class="top-note">直接进入后台。先选前台模块，再选材料通道；发布后前台同名模块会显示。</p>
    </div>
    <div class="actions">
      <button id="reloadBtn" class="secondary" type="button">刷新记录</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>发布新记录</h2>
      <div id="status" class="status">后台已打开，可以先选择图片预览。</div>
      <div id="progress" class="progress"><div></div></div>
      <div id="loginStrip" class="login-strip">
        <span id="loginText">免 GitHub 弹窗登录。发布会通过本站服务端提交到 GitHub。</span>
      </div>

      <label>
        选择前台模块
        <select id="module">
          <option value="factory">中国工厂・供应链实景</option>
          <option value="site">日本现场记录</option>
        </select>
      </label>

      <label id="channelField">
        材料上传通道
        <select id="channel">
          <option value="advertising">广告材料制作工厂</option>
          <option value="curtain">窗帘加工制作工厂</option>
          <option value="wpc">塑木板材料工厂</option>
        </select>
        <span class="hint">选择后会自动填写标题和说明；前台会显示在同名工厂模块里。</span>
      </label>

      <label>
        标题
        <input id="title" type="text" placeholder="例如：广告材料制作工厂">
      </label>

      <label>
        简短说明（可选）
        <textarea id="summary" placeholder="例如：材料、包装、出货前状态记录。"></textarea>
      </label>

      <div class="file-box">
        <strong>上传图片 / 视频</strong>
        <button id="selectFilesBtn" class="secondary" type="button">选择图片 / 视频（可多选）</button>
        <input id="files" class="file-input" type="file" multiple accept="image/*,video/mp4,video/webm">
        <span id="fileSummary" class="hint">未选择文件。</span>
        <span class="hint">支持手机照片、JPG / PNG / WebP / 小 MP4 / WebM。图片会在浏览器本地压缩；日本现场照片会压到更适合后台上传的尺寸。</span>
      </div>

      <div id="previewGrid" class="preview-grid"></div>

      <div class="actions">
        <button id="publishBtn" type="button">上传并发布</button>
        <button id="clearBtn" class="secondary" type="button">清空表单</button>
      </div>
    </section>

    <aside class="panel">
      <h2>当前前台记录</h2>
      <p class="hint">这里读取 data/records.json。删除只从前台索引移除，不删除已上传媒体文件。</p>
      <div id="recordList" class="record-grid"></div>
    </aside>
  </main>

  <script>
    (function () {
      var records = [];

      var $ = function (id) { return document.getElementById(id); };
      var status = $("status");
      var progressBar = $("progress").firstElementChild;
      var loginStrip = $("loginStrip");
      var loginText = $("loginText");
      var reloadBtn = $("reloadBtn");
      var publishBtn = $("publishBtn");
      var clearBtn = $("clearBtn");
      var selectFilesBtn = $("selectFilesBtn");
      var filesInput = $("files");
      var fileSummary = $("fileSummary");
      var previewGrid = $("previewGrid");
      var recordList = $("recordList");
      var moduleInput = $("module");
      var channelInput = $("channel");
      var channelField = $("channelField");

      var moduleLabels = {
        factory: "中国工厂・供应链实景",
        site: "日本现场记录"
      };

      var channelLabels = {
        advertising: {
          title: "广告材料制作工厂",
          summary: "广告材料制作、出货前确认、包装状态记录。",
          i18n: {
            ja: { title: "広告材料制作工場", summary: "広告材料制作、出荷前確認、包装状態の記録。" },
            zh: { title: "广告材料制作工厂", summary: "广告材料制作、出货前确认、包装状态记录。" },
            en: { title: "Advertising Material Production Factory", summary: "Advertising material production, pre-shipment check, and packing status record." }
          }
        },
        curtain: {
          title: "窗帘加工制作工厂",
          summary: "窗帘材料、加工、包装状态记录。",
          i18n: {
            ja: { title: "カーテン加工工場", summary: "カーテン資材、加工、包装状態の記録。" },
            zh: { title: "窗帘加工制作工厂", summary: "窗帘材料、加工、包装状态记录。" },
            en: { title: "Curtain Production Factory", summary: "Curtain material, processing, and packing status record." }
          }
        },
        wpc: {
          title: "塑木板材料工厂",
          summary: "人工木地板材料、工厂库存与出货前状态记录。",
          i18n: {
            ja: { title: "人工木デッキ材工場", summary: "人工木デッキ材、工場在庫、出荷前状態の記録。" },
            zh: { title: "塑木板材料工厂", summary: "人工木地板材料、工厂库存与出货前状态记录。" },
            en: { title: "WPC Decking Material Factory", summary: "WPC decking material, factory stock, and pre-shipment status record." }
          }
        }
      };

      function setStatus(message, type) {
        status.textContent = message;
        status.className = "status" + (type ? " " + type : "");
      }

      function setProgress(done, total) {
        var pct = total ? Math.round((done / total) * 100) : 0;
        progressBar.style.width = Math.max(0, Math.min(100, pct)) + "%";
      }

      function updateLoginUi() {
        loginStrip.className = "login-strip ok";
        loginText.textContent = "后台已打开。发布和删除会通过本站服务端提交，不再弹 GitHub 登录窗口。";
      }

      function syncModuleFields(forceTitle) {
        var isFactory = moduleInput.value === "factory";
        channelField.style.display = isFactory ? "grid" : "none";
        if (isFactory) {
          var channel = channelLabels[channelInput.value] || channelLabels.advertising;
          if (forceTitle || !$("title").value.trim()) $("title").value = channel.title;
          if (forceTitle || !$("summary").value.trim()) $("summary").value = channel.summary;
          setStatus("将发布到前台：" + moduleLabels.factory + " → " + channel.title + "。", "ok");
        } else {
          if (forceTitle || !$("title").value.trim()) $("title").value = "日本现场到场记录";
          if (forceTitle || !$("summary").value.trim()) $("summary").value = "材料到场、尺寸确认、安装前确认或交付状态记录。";
          setStatus("将发布到前台：" + moduleLabels.site + "。", "ok");
        }
      }

      async function adminApi(payload) {
        var options = payload ? {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        } : {};
        var res = await fetch("/api/admin-records", options);
        var data = await res.json().catch(function () { return null; });
        if (!res.ok || !data || !data.ok) throw new Error((data && data.message) || ("Admin API error: " + res.status));
        return data;
      }

      async function loadRecords() {
        recordList.innerHTML = "";
        try {
          var data = await adminApi();
          records = data.records || [];
          renderRecords();
          if (data.writable === false) {
            setStatus("已读取前台记录 " + records.length + " 条。当前缺少服务端 GitHub 写入 token，只能查看，不能发布。", "warn");
          } else {
            setStatus("已读取前台记录 " + records.length + " 条。", "ok");
          }
        } catch (error) {
          recordList.innerHTML = '<p class="hint">读取失败：' + escapeHtml(error.message) + '</p>';
          setStatus("读取 records.json 失败：" + error.message, "warn");
        }
      }

      function renderRecords() {
        recordList.innerHTML = "";
        if (!records.length) {
          recordList.innerHTML = '<p class="hint">暂无记录。</p>';
          return;
        }
        records.forEach(function (record) {
          var card = document.createElement("div");
          card.className = "record";
          var mediaCount = Array.isArray(record.media) ? record.media.length : 0;
          var moduleText = record.module === "site" ? "日本现场记录" : "中国工厂・供应链实景";
          var channelText = record.module === "factory" && record.channel && channelLabels[record.channel] ? " / " + channelLabels[record.channel].title : "";
	          card.innerHTML = '<h3>' + escapeHtml(record.title || "未命名记录") + '</h3>' +
	            '<small>' + escapeHtml(moduleText + channelText) + '</small>' +
	            '<div><strong>' + mediaCount + '</strong> 个媒体</div>' +
	            '<small>' + escapeHtml(record.id || "") + '</small>' +
	            '<div class="actions">' +
	            '<button class="secondary edit-media" type="button">编辑图片</button>' +
	            '<button class="danger remove-record" type="button">从前台移除</button>' +
	            '</div>' +
	            '<div class="media-editor"></div>';
	          card.querySelector(".remove-record").addEventListener("click", function () { deleteRecord(record.id); });
	          card.querySelector(".edit-media").addEventListener("click", function () { toggleMediaEditor(card, record); });
	          recordList.appendChild(card);
	        });
	      }

	      function mediaName(src) {
	        return String(src || "").split("/").pop() || "media";
	      }

	      function mediaPreview(src) {
	        var safe = escapeHtml(src);
	        if (isVideo(src)) return '<video src="' + safe + '" controls muted></video>';
	        return '<img src="' + safe + '" alt="' + escapeHtml(mediaName(src)) + '">';
	      }

	      function renderMediaEditor(container, record) {
	        var editor = container.querySelector(".media-editor");
	        var media = Array.isArray(record.media) ? record.media : [];
	        editor.innerHTML = '<div class="media-grid">' + media.map(function (src, index) {
	          return '<div class="media-item">' +
	            mediaPreview(src) +
	            '<label><input type="checkbox" value="' + index + '"> ' + escapeHtml(String(index + 1).padStart(2, "0") + " " + mediaName(src)) + '</label>' +
	            '</div>';
	        }).join("") + '</div>' +
	        '<div class="media-actions">' +
	          '<button class="danger delete-selected" type="button">删除选中</button>' +
	          '<button class="secondary select-all" type="button">全选</button>' +
	          '<button class="secondary add-media" type="button">添加图片 / 视频</button>' +
	        '</div>' +
	        '<input class="file-input add-media-input" type="file" multiple accept="image/*,video/mp4,video/webm">';
	        editor.querySelector(".delete-selected").addEventListener("click", function () { deleteSelectedMedia(record, editor); });
	        editor.querySelector(".select-all").addEventListener("click", function () {
	          editor.querySelectorAll('input[type="checkbox"]').forEach(function (input) { input.checked = true; });
	        });
	        editor.querySelector(".add-media").addEventListener("click", function () { editor.querySelector(".add-media-input").click(); });
	        editor.querySelector(".add-media-input").addEventListener("change", function (event) { addMediaToRecord(record, Array.from(event.target.files || [])); });
	      }

	      function toggleMediaEditor(container, record) {
	        var editor = container.querySelector(".media-editor");
	        if (editor.classList.contains("open")) {
	          editor.classList.remove("open");
	          return;
	        }
	        renderMediaEditor(container, record);
	        editor.classList.add("open");
	      }

	      async function saveRecordMedia(record, media, successMessage, uploadFiles) {
	        var result = await adminApi({ action: "update-media", id: record.id, media: media, uploadFiles: uploadFiles || [] });
	        records = result.records || records.map(function (item) {
	          return item && item.id === record.id ? Object.assign({}, item, { media: media }) : item;
	        });
	        renderRecords();
	        setStatus(successMessage, "ok");
	      }

	      async function deleteSelectedMedia(record, editor) {
	        var selected = Array.from(editor.querySelectorAll('input[type="checkbox"]:checked')).map(function (input) {
	          return Number(input.value);
	        });
	        if (!selected.length) return setStatus("请先勾选要删除的图片 / 视频。", "warn");
	        if (!window.confirm("确定从这条记录移除选中的 " + selected.length + " 个媒体？\n媒体文件会保留，只是不再显示在前台。")) return;
	        var selectedMap = {};
	        selected.forEach(function (index) { selectedMap[index] = true; });
	        var nextMedia = (record.media || []).filter(function (_src, index) { return !selectedMap[index]; });
	        publishBtn.disabled = true;
	        try {
	          await saveRecordMedia(record, nextMedia, "已从这条记录移除 " + selected.length + " 个媒体。Vercel 会随后自动部署。");
	        } catch (error) {
	          setStatus("删除媒体失败：" + error.message, "warn");
	        } finally {
	          publishBtn.disabled = false;
	        }
	      }

	      async function addMediaToRecord(record, files) {
	        if (!files.length) return;
	        var unsupported = files.filter(function (file) { return !isAllowed(file); });
	        if (unsupported.length) return setStatus("不支持这些文件：" + unsupported.map(function (file) { return file.name; }).join("、") + "。请使用手机照片、JPG / PNG / WebP 或 MP4 / WebM。", "warn");
	        var oversizedVideos = files.filter(function (file) { return isVideo(file) && file.size > 25 * 1024 * 1024; });
	        if (oversizedVideos.length) return setStatus("视频太大，请先压缩到 25MB 以下 MP4 / WebM。", "warn");
	        publishBtn.disabled = true;
	        setProgress(0, 1);
	        try {
	          var mediaPaths = [];
	          var uploadFiles = [];
	          var savedBytes = 0;
	          var moduleName = record.module || "factory";
	          var channelName = moduleName === "factory" ? (record.channel || "advertising") : "site";
	          var imageOptions = moduleName === "site"
	            ? { maxSide: 1280, quality: 0.64 }
	            : { maxSide: 1500, quality: 0.7 };
	          for (var i = 0; i < files.length; i += 1) {
	            var source = files[i];
	            setStatus("正在追加媒体 " + (i + 1) + " / " + files.length + "：" + source.name);
	            var prepared = isVideo(source) ? { file: source, originalSize: source.size, compressed: false } : await compressImage(source, imageOptions);
	            if (prepared.compressed) savedBytes += prepared.originalSize - prepared.compressedSize;
	            var preparedFile = prepared.file;
	            var mediaBase = moduleName === "factory"
	              ? "media/records/factory/" + channelName + "/" + record.id
	              : "media/records/site/" + record.id;
	            var mediaPath = mediaBase + "/" + cleanFileName(preparedFile, i, isVideo(preparedFile) ? null : ".jpg");
	            var base64 = await fileToBase64(preparedFile);
	            if (base64.length > 3500000) throw new Error("单个文件压缩后仍然太大：" + source.name + "。请先裁剪或压缩后再上传。");
	            var uploaded = await adminApi({ action: "blob", file: { path: mediaPath, content: base64 } });
	            uploadFiles.push(uploaded.file);
	            mediaPaths.push("/" + uploaded.file.path);
	            setProgress(i + 1, files.length + 1);
	          }
	          var nextMedia = (record.media || []).concat(mediaPaths);
	          setProgress(files.length + 1, files.length + 1);
	          await saveRecordMedia(record, nextMedia, "已追加 " + mediaPaths.length + " 个媒体" + (savedBytes ? "，约减少 " + bytesText(savedBytes) : "") + "。Vercel 会随后自动部署。", uploadFiles);
	        } catch (error) {
	          setStatus("追加媒体失败：" + error.message, "warn");
	        } finally {
	          publishBtn.disabled = false;
	        }
	      }

	      function bytesText(size) {
        if (size > 1024 * 1024) return (size / 1024 / 1024).toFixed(1) + "MB";
        return Math.max(1, Math.round(size / 1024)) + "KB";
      }

      function nowStamp() {
        var d = new Date();
        var pad = function (n) { return String(n).padStart(2, "0"); };
        return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
      }

      function slugify(text) {
        var ascii = String(text || "").toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
        return (ascii || "record").slice(0, 54);
      }

      function cleanFileName(file, index, ext) {
        var suffix = ext || (file.name.match(/\.[a-z0-9]+$/i) || [""])[0].toLowerCase();
        var base = file.name.replace(/\.[^.]+$/u, "").toLowerCase()
          .replace(/[^a-z0-9\u4e00-\u9fa5ぁ-んァ-ン一-龥]+/gu, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 54) || "media";
        return nowStamp() + "-" + String(index + 1).padStart(2, "0") + "-" + base + suffix;
      }

      function isVideo(fileOrPath) {
        var value = typeof fileOrPath === "string" ? fileOrPath : (fileOrPath.type || fileOrPath.name || "");
        return /video|\.mp4$|\.webm$/i.test(value);
      }

      function isAllowed(file) {
        return /^image\//i.test(file.type || "") ||
          /\.(jpe?g|png|webp|heic|heif)$/i.test(file.name || "") ||
          /^video\/(mp4|webm)$/i.test(file.type || "") ||
          /\.(mp4|webm)$/i.test(file.name || "");
      }

      function fileToBase64(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () { resolve(String(reader.result).split(",")[1]); };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function compressImage(file, options) {
        return new Promise(function (resolve, reject) {
          if (!/^image\//i.test(file.type || "") && !/\.(jpe?g|png|webp|heic|heif)$/i.test(file.name || "")) {
            resolve({ file: file, originalSize: file.size, compressed: false });
            return;
          }
          var maxSide = options && options.maxSide ? options.maxSide : 1600;
          var quality = options && options.quality ? options.quality : 0.72;
          var image = new Image();
          var objectUrl = URL.createObjectURL(file);
          image.onload = function () {
            URL.revokeObjectURL(objectUrl);
            var width = image.naturalWidth || image.width;
            var height = image.naturalHeight || image.height;
            var scale = Math.min(1, maxSide / Math.max(width, height));
            var canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(width * scale));
            canvas.height = Math.max(1, Math.round(height * scale));
            var ctx = canvas.getContext("2d", { alpha: false });
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(function (blob) {
              if (!blob) return resolve({ file: file, originalSize: file.size, compressed: false });
              var output = new File([blob], file.name.replace(/\.[^.]+$/u, "") + ".jpg", { type: "image/jpeg" });
              if (output.size >= file.size) return resolve({ file: file, originalSize: file.size, compressed: false });
              resolve({ file: output, originalSize: file.size, compressedSize: output.size, compressed: true });
            }, "image/jpeg", quality);
          };
          image.onerror = function () {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("图片无法在浏览器内压缩：" + file.name + "。如果是 HEIC，请在手机相册分享为 JPG，或在相机设置里选择“兼容性最佳”。"));
          };
          image.src = objectUrl;
        });
      }

      function renderLocalPreviews() {
        previewGrid.innerHTML = "";
        var files = Array.from(filesInput.files || []);
        var rejected = files.filter(function (file) { return !isAllowed(file); });
        if (rejected.length) {
          setStatus("有不支持的文件：" + rejected.map(function (file) { return file.name; }).join("、") + "。请使用手机照片、JPG / PNG / WebP 或 MP4 / WebM。", "warn");
        } else if (files.length) {
          setStatus("已选择 " + files.length + " 个文件。每张图片大小已显示，发布前会自动压缩。", "ok");
        }
        fileSummary.textContent = files.length ? "已选择 " + files.length + " 个文件，总大小 " + bytesText(files.reduce(function (sum, file) { return sum + file.size; }, 0)) + "。" : "未选择文件。";
        files.forEach(function (file) {
          var card = document.createElement("div");
          card.className = "thumb";
          var media = isVideo(file) ? document.createElement("video") : document.createElement("img");
          media.src = URL.createObjectURL(file);
          if (media.tagName === "VIDEO") {
            media.controls = true;
            media.muted = true;
          }
          media.onload = media.onloadeddata = function () { URL.revokeObjectURL(media.src); };
          var label = document.createElement("span");
          label.textContent = file.name + " / " + bytesText(file.size);
          card.appendChild(media);
          card.appendChild(label);
          previewGrid.appendChild(card);
        });
      }

      async function publishRecord() {
        var moduleName = moduleInput.value;
        var channelName = moduleName === "factory" ? channelInput.value : "site";
        var channelMeta = channelLabels[channelName];
        var title = $("title").value.trim();
        var summary = $("summary").value.trim();
        var files = Array.from(filesInput.files || []);
        if (!title) return setStatus("请填写标题。", "warn");
        if (!files.length) return setStatus("请先选择至少一张图片或一个小视频。", "warn");
        var unsupported = files.filter(function (file) { return !isAllowed(file); });
        if (unsupported.length) return setStatus("不支持这些文件：" + unsupported.map(function (file) { return file.name; }).join("、") + "。请使用手机照片、JPG / PNG / WebP 或 MP4 / WebM。", "warn");
        var oversizedVideos = files.filter(function (file) { return isVideo(file) && file.size > 25 * 1024 * 1024; });
        if (oversizedVideos.length) return setStatus("视频太大，请先压缩到 25MB 以下 MP4 / WebM。", "warn");

        publishBtn.disabled = true;
        setProgress(0, 1);
        try {
          var stamp = nowStamp();
          var id = slugify(title) + "-" + stamp;
          var mediaPaths = [];
          var uploadFiles = [];
          var savedBytes = 0;
          var imageOptions = moduleName === "site"
            ? { maxSide: 1280, quality: 0.64 }
            : { maxSide: 1500, quality: 0.7 };
          for (var i = 0; i < files.length; i += 1) {
            var source = files[i];
            setStatus("正在压缩 / 读取媒体 " + (i + 1) + " / " + files.length + "：" + source.name);
            var prepared = isVideo(source) ? { file: source, originalSize: source.size, compressed: false } : await compressImage(source, imageOptions);
            if (prepared.compressed) savedBytes += prepared.originalSize - prepared.compressedSize;
            var preparedFile = prepared.file;
            var mediaBase = moduleName === "factory"
              ? "media/records/factory/" + channelName + "/" + id
              : "media/records/site/" + id;
            var mediaPath = mediaBase + "/" + cleanFileName(preparedFile, i, isVideo(preparedFile) ? null : ".jpg");
            var base64 = await fileToBase64(preparedFile);
            if (base64.length > 3500000) throw new Error("单个文件压缩后仍然太大：" + source.name + "。请先裁剪或压缩后再上传。");
            setStatus("正在上传媒体 " + (i + 1) + " / " + files.length + "：" + source.name);
            var uploaded = await adminApi({ action: "blob", file: { path: mediaPath, content: base64 } });
            uploadFiles.push(uploaded.file);
            mediaPaths.push("/" + mediaPath);
            setProgress(i + 1, files.length * 2 + 1);
          }
          var record = {
            id: id,
            module: moduleName,
            channel: channelName,
            title: title,
            summary: summary,
            i18n: channelMeta ? channelMeta.i18n : undefined,
            createdAt: new Date().toISOString(),
            media: mediaPaths
          };
          setProgress(files.length + 1, files.length + 2);
          setStatus("正在发布记录索引：媒体 " + uploadFiles.length + " 个 + records.json 1 个。");
          var result = await adminApi({ action: "publish", record: record, uploadFiles: uploadFiles });
          records = result.records || [record].concat(records);
          renderRecords();
          setProgress(1, 1);
          setStatus("发布成功。前台会显示这条记录。图片已自动压缩" + (savedBytes ? "，约减少 " + bytesText(savedBytes) : "") + "。Vercel 会随后自动部署。", "ok");
          clearForm();
        } catch (error) {
          setStatus("发布失败：" + error.message, "warn");
        } finally {
          publishBtn.disabled = false;
        }
      }

      async function deleteRecord(id) {
        var target = records.find(function (record) { return record.id === id; });
        if (!target) return;
        if (!window.confirm("确定从前台移除这条记录？\n" + target.title + "\n媒体文件会保留。")) return;
        publishBtn.disabled = true;
        try {
          var result = await adminApi({ action: "remove", id: id });
          records = result.records || records.filter(function (record) { return record.id !== id; });
          renderRecords();
          setStatus("已从前台移除记录。Vercel 会随后自动部署。", "ok");
        } catch (error) {
          setStatus("删除失败：" + error.message, "warn");
        } finally {
          publishBtn.disabled = false;
        }
      }

      function clearForm() {
        $("title").value = "";
        $("summary").value = "";
        filesInput.value = "";
        previewGrid.innerHTML = "";
        fileSummary.textContent = "未选择文件。";
        setProgress(0, 1);
        syncModuleFields(false);
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (ch) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[ch];
        });
      }

      selectFilesBtn.addEventListener("click", function () { filesInput.click(); });
      filesInput.addEventListener("change", renderLocalPreviews);
      moduleInput.addEventListener("change", function () { syncModuleFields(true); });
      channelInput.addEventListener("change", function () { syncModuleFields(true); });
      publishBtn.addEventListener("click", publishRecord);
      clearBtn.addEventListener("click", clearForm);
      reloadBtn.addEventListener("click", loadRecords);

      updateLoginUi();
      syncModuleFields(false);
      loadRecords();
    })();
  </script>
</body>
</html>
