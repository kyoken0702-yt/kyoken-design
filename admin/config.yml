backend:
  name: github
  repo: kyoken0702-yt/kyoken-design
  branch: master
  base_url: https://www.kyoken.design
  auth_endpoint: api/auth

locale: "zh_Hans"

media_folder: "media/records"
public_folder: "/media/records"

editor:
  preview: false

collections:
  - name: "daily_supply_records"
    label: "首页模块｜每日记录・今日供应链"
    label_singular: "每日记录"
    folder: "data/supply-chain-records"
    media_folder: "../../media/records/today"
    public_folder: "/media/records/today"
    create: true
    filter: { field: "category", value: "today" }
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title"
    summary: "{{date}} / 今日供应链 / {{title}}"
    fields:
      - { label: "标题（后台列表用）", name: "title", widget: "string", hint: "例：窗帘面料包装确认" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY.MM.DD", time_format: false, format: "YYYY.MM.DD", default: "{{now}}" }
      - { label: "URL编号", name: "slug", widget: "string", required: false, hint: "可不填。例：2026-07-01-curtain-packing" }
      - { label: "前台显示模块", name: "category", widget: "hidden", default: "today" }
      - { label: "首页显示", name: "showOnHome", widget: "boolean", default: true, hint: "关闭后只保存在记录页，不显示在首页。" }
      - { label: "封面图片（网页显示）", name: "image", widget: "image", required: false, hint: "用于首页【每日记录】和记录页直接显示。请上传 JPG / PNG / WebP。手机 HEIC 请先转 JPG。" }
      - { label: "网页视频（MP4）", name: "video", widget: "file", required: false, hint: "用于网页直接播放。请上传 MP4（H.264）。手机 MOV 建议先转 MP4。" }
      - label: "手机原始素材备份（不直接显示）"
        name: "mobileAssets"
        widget: "list"
        required: false
        hint: "可备份手机 HEIC / MOV 原文件，但这些文件不用于网页直接展示。网页显示请使用上面的封面图片或网页视频。"
        fields:
          - { label: "原始文件", name: "file", widget: "file" }
          - { label: "备注", name: "note", widget: "string", required: false }
      - label: "中文内容"
        name: "zh"
        widget: "object"
        fields:
          - { label: "中文标题", name: "title", widget: "string" }
          - { label: "中文摘要", name: "summary", widget: "text" }
          - label: "中文要点"
            name: "details"
            widget: "list"
            required: false
            field: { label: "中文要点", name: "item", widget: "string" }
      - label: "日本語内容（手動入力）"
        name: "ja"
        widget: "object"
        fields:
          - { label: "日本語タイトル", name: "title", widget: "string" }
          - { label: "日本語概要", name: "summary", widget: "text" }
          - label: "日本語要点"
            name: "details"
            widget: "list"
            required: false
            field: { label: "日本語要点", name: "item", widget: "string" }
      - label: "English Content"
        name: "en"
        widget: "object"
        fields:
          - { label: "English Title", name: "title", widget: "string" }
          - { label: "English Summary", name: "summary", widget: "text" }
          - label: "English Points"
            name: "details"
            widget: "list"
            required: false
            field: { label: "English Point", name: "item", widget: "string" }

