backend:
  name: github
  repo: kyoken0702-yt/kyoken-design
  branch: master
  base_url: https://www.kyoken.design
  auth_endpoint: api/auth

locale: "zh_Hans"

media_folder: "media/records"
public_folder: "/media/records"

collections:
  - name: "supply_chain_records"
    label: "供应链记录"
    label_singular: "供应链记录"
    folder: "data/supply-chain-records"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title"
    summary: "{{date}} / {{category}} / {{title}}"
    fields:
      - { label: "标题（后台列表用）", name: "title", widget: "string", hint: "例：窗帘面料包装确认" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY.MM.DD", time_format: false, format: "YYYY.MM.DD", default: "{{now}}" }
      - { label: "URL编号", name: "slug", widget: "string", required: false, hint: "可不填。例：2026-07-01-curtain-packing" }
      - label: "栏目"
        name: "category"
        widget: "select"
        default: "today"
        hint: "选择图片显示位置：今日供应链显示到首页【每日记录】；中国工厂显示到首页【工厂侧】；日本现场显示到首页【现场记录】。"
        options:
          - { label: "今日供应链", value: "today" }
          - { label: "中国工厂", value: "factory" }
          - { label: "日本现场", value: "site" }
      - label: "产品"
        name: "product"
        widget: "select"
        default: "other"
        options:
          - { label: "定制窗帘", value: "curtain" }
          - { label: "亚克力切文字标识", value: "acrylic" }
          - { label: "灯箱电饰膜", value: "lightbox" }
          - { label: "PVC板标牌", value: "pvc" }
          - { label: "珐琅磁吸板", value: "enamel" }
          - { label: "毛毡吸音板", value: "acoustic" }
          - { label: "墙纸 / 墙布材料", value: "wallpaper" }
          - { label: "人工木地板材料", value: "wpc" }
          - { label: "其他", value: "other" }
      - { label: "首页显示", name: "showOnHome", widget: "boolean", default: true, hint: "关闭后只保存在记录页，不显示在首页三个板块。" }
      - { label: "图片", name: "image", widget: "image", required: false, hint: "建议上传 JPG / PNG / WebP，不建议 HEIC。点 Upload 上传后，还要选中图片并点 Choose selected，字段里出现图片路径后再保存/发布。" }
      - { label: "视频", name: "video", widget: "file", required: false, hint: "如同时上传视频和图片，图片会作为视频封面。" }
      - label: "中文内容"
        name: "zh"
        widget: "object"
        fields:
          - { label: "中文标签", name: "label", widget: "string", default: "现场记录" }
          - { label: "中文标题", name: "title", widget: "string" }
          - { label: "中文摘要", name: "summary", widget: "text" }
          - label: "中文要点"
            name: "details"
            widget: "list"
            required: false
            field: { label: "中文要点", name: "item", widget: "string" }
      - label: "日本語内容（手動入力）"
        name: "ja"
        widget: "object"
        fields:
          - { label: "日本語ラベル", name: "label", widget: "string", default: "現場記録" }
          - { label: "日本語タイトル", name: "title", widget: "string" }
          - { label: "日本語概要", name: "summary", widget: "text" }
          - label: "日本語要点"
            name: "details"
            widget: "list"
            required: false
            field: { label: "日本語要点", name: "item", widget: "string" }
      - label: "English Content"
        name: "en"
        widget: "object"
        fields:
          - { label: "English Label", name: "label", widget: "string", default: "Site Record" }
          - { label: "English Title", name: "title", widget: "string" }
          - { label: "English Summary", name: "summary", widget: "text" }
          - label: "English Points"
            name: "details"
            widget: "list"
            required: false
            field: { label: "English Point", name: "item", widget: "string" }
