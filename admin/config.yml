backend:
  name: github
  repo: kyoken0702-yt/kyoken-design
  branch: master
  base_url: https://www.kyoken.design
  auth_endpoint: api/auth

locale: "zh_Hans"

media_folder: "media/records"
public_folder: "/media/records"

editor:
  preview: false

collections:
  - name: "daily_supply_records"
    label: "首页模块｜每日记录・今日供应链"
    label_singular: "每日记录"
    folder: "data/supply-chain-records"
    media_folder: "../../media/records/today"
    public_folder: "/media/records/today"
    create: true
    delete: true
    filter: { field: "category", value: "today" }
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title"
    summary: "{{date}} / 今日供应链 / {{title}}"
    fields:
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY.MM.DD", time_format: false, format: "YYYY.MM.DD", default: "{{now}}" }
      - { label: "前台显示模块", name: "category", widget: "hidden", default: "today" }
      - { label: "封面图片", name: "image", widget: "image", required: false, hint: "上传 JPG / PNG / WebP。手机 HEIC 请先转 JPG。" }
      - { label: "视频", name: "video", widget: "file", required: false, hint: "上传 MP4。手机 MOV 请先转 MP4。" }
      - { label: "后台标题", name: "title", widget: "string", hint: "后台列表用。建议和中文标题一致。" }
      - label: "中文内容"
        name: "zh"
        widget: "object"
        fields:
          - { label: "中文标题", name: "title", widget: "string" }
          - { label: "中文说明", name: "summary", widget: "text" }
      - label: "日本語内容（手動入力）"
        name: "ja"
        widget: "object"
        fields:
          - { label: "日本語タイトル", name: "title", widget: "string" }
          - { label: "日本語説明", name: "summary", widget: "text" }
      - label: "English Content"
        name: "en"
        widget: "object"
        fields:
          - { label: "English Title", name: "title", widget: "string" }
          - { label: "English Description", name: "summary", widget: "text" }

